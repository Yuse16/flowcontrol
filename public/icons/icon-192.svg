<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a5b4fc" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="192" height="192" rx="35" fill="url(#bg)"/>
  
  <!-- Subtle glow circle -->
  <circle cx="67.19999999999999" cy="57.599999999999994" r="67.19999999999999" fill="url(#glow)" opacity="0.5"/>
  
  <!-- Border -->
  <rect x="2" y="2" width="188" height="188" rx="35" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>
  
  <!-- FC Letters -->
  <text x="96" y="119.03999999999999" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="72.96000000000001" fill="url(#accent)" text-anchor="middle" letter-spacing="-3.84">FC</text>
  
  <!-- Small tagline -->
  <text x="96" y="142.07999999999998" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="12.48" fill="#94a3b8" text-anchor="middle" letter-spacing="2.88">FLOWCONTROL</text>
</svg>